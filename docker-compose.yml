services:
  db:
    image: postgres:17
    container_name: ecommerce_psql_db
    restart: always
    environment:
      POSTGRES_USER: otavio
      POSTGRES_PASSWORD: 4d1v1nh4
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: ecommerce_backend
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://otavio:4d1v1nh4@db:5432/ecommerce
  

  frontend:
    build: ./frontend
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: